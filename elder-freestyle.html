<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>亲声伴读 - 自由学习</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "elder-bg": "#FFF8F0",
            "elder-warm": "#FFF8F0",
            "warm-orange": "#FF9F43",
            "warm-orange-dark": "#E67E22",
            "warm-cream": "#FFFBF5",
            "surface": "#f7f5ff",
            "surface-container": "#e4e7ff",
            "surface-container-low": "#efefff",
            "surface-container-lowest": "#ffffff",
            "primary": "#0057bd",
            "primary-container": "#6e9fff",
            "secondary": "#3a53b7",
            "secondary-container": "#c7cfff",
            "tertiary": "#893c92",
            "tertiary-container": "#f199f7",
            "on-surface": "#242c51",
            "on-surface-variant": "#515981",
            "outline-variant": "#a3abd7",
            "category-travel": "#FF6B6B",
            "category-shopping": "#4ECDC4",
            "category-health": "#95E1A3",
            "category-daily": "#FFD93D",
            "category-food": "#FF9F43",
            "category-emergency": "#E63946",
          },
          fontFamily: {
            "elder": ["Noto Sans SC", "sans-serif"],
          },
          borderRadius: {
            "2xl": "1.5rem",
            "3xl": "2rem",
            "4xl": "2.5rem",
          },
          fontSize: {
            "huge": ["3.5rem", { lineHeight: "1.1" }],
            "massive": ["4.5rem", { lineHeight: "1.1" }],
          }
        },
      },
    }
  </script>
  
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 48;
    }
    
    .elder-shadow {
      box-shadow: 0 20px 40px -10px rgba(255, 159, 67, 0.3);
    }
    
    .category-card {
      transition: all 0.3s ease;
    }
    
    .category-card:active {
      transform: scale(0.95);
    }
    
    body {
      font-family: 'Noto Sans SC', sans-serif;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
  </style>
</head>

<body class="bg-elder-warm min-h-screen flex flex-col">
  
  <!-- Top Navigation -->
  <nav class="bg-white/80 backdrop-blur-xl shadow-sm sticky top-0 z-50">
    <div class="flex justify-between items-center px-6 py-4">
      <button onclick="navigateTo('home')" class="p-2 text-slate-500 hover:bg-warm-orange/10 transition-colors rounded-full">
        <span class="material-symbols-outlined text-3xl">arrow_back</span>
      </button>
      <span class="text-2xl font-black text-warm-orange-dark">自由学习</span>
      <div class="w-12 h-12 rounded-full bg-surface-container overflow-hidden border-2 border-warm-orange/30">
        <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA36ML8HLIjJhksWM9xCpWLpxnBwtelNi62b9V99hW36-E9C1DCdeqCWXg1epSCbN2PA1Q6lG1yN6oI-1FOadeYtgwKjeSAfa6xLFcIVS-ksuY5ORTPjyKmy2G_Y9skbrpv_cTz3JJNtA0enziJCdRURjVXQdjshWGlk-g-_4R1fuutzxUQvqrLy0fDetIGD30vKGfpq3we1Ux0G9ODrGYE7LnPSo4oSQPNr3PW7R65kdkPaVMfnvkVSxc2VJ5SFnIqCUclv5h_1jn3" alt="用户头像"/>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-1 px-6 pt-8 pb-32">
    
    <!-- Welcome Header -->
    <div class="text-center mb-10">
      <h1 class="text-4xl font-black text-on-surface mb-3">想学什么？</h1>
      <p class="text-xl text-on-surface-variant font-medium">选择一个类别，开始学习吧</p>
    </div>

    <!-- Category Grid -->
    <div class="grid grid-cols-2 gap-4 mb-10">
      
      <!-- Travel Category -->
      <button onclick="selectCategory('travel')" class="category-card bg-gradient-to-br from-category-travel to-red-500 text-white rounded-4xl p-6 elder-shadow flex flex-col items-center justify-center gap-3 min-h-[160px]">
        <span class="material-symbols-outlined text-6xl">flight_takeoff</span>
        <span class="text-2xl font-black">出行旅游</span>
        <span class="text-white/80 text-base font-medium">12 个单词</span>
      </button>

      <!-- Shopping Category -->
      <button onclick="selectCategory('shopping')" class="category-card bg-gradient-to-br from-category-shopping to-teal-500 text-white rounded-4xl p-6 elder-shadow flex flex-col items-center justify-center gap-3 min-h-[160px]">
        <span class="material-symbols-outlined text-6xl">shopping_cart</span>
        <span class="text-2xl font-black">超市购物</span>
        <span class="text-white/80 text-base font-medium">15 个单词</span>
      </button>

      <!-- Health Category -->
      <button onclick="selectCategory('health')" class="category-card bg-gradient-to-br from-category-health to-green-500 text-white rounded-4xl p-6 elder-shadow flex flex-col items-center justify-center gap-3 min-h-[160px]">
        <span class="material-symbols-outlined text-6xl">local_hospital</span>
        <span class="text-2xl font-black">医疗健康</span>
        <span class="text-white/80 text-base font-medium">10 个单词</span>
      </button>

      <!-- Daily Category -->
      <button onclick="selectCategory('daily')" class="category-card bg-gradient-to-br from-category-daily to-yellow-500 text-white rounded-4xl p-6 elder-shadow flex flex-col items-center justify-center gap-3 min-h-[160px]">
        <span class="material-symbols-outlined text-6xl">home</span>
        <span class="text-2xl font-black">日常生活</span>
        <span class="text-white/80 text-base font-medium">18 个单词</span>
      </button>

      <!-- Food Category -->
      <button onclick="selectCategory('food')" class="category-card bg-gradient-to-br from-category-food to-orange-500 text-white rounded-4xl p-6 elder-shadow flex flex-col items-center justify-center gap-3 min-h-[160px]">
        <span class="material-symbols-outlined text-6xl">restaurant</span>
        <span class="text-2xl font-black">餐厅就餐</span>
        <span class="text-white/80 text-base font-medium">14 个单词</span>
      </button>

      <!-- Emergency Category -->
      <button onclick="selectCategory('emergency')" class="category-card bg-gradient-to-br from-category-emergency to-red-600 text-white rounded-4xl p-6 elder-shadow flex flex-col items-center justify-center gap-3 min-h-[160px]">
        <span class="material-symbols-outlined text-6xl">emergency</span>
        <span class="text-2xl font-black">紧急情况</span>
        <span class="text-white/80 text-base font-medium">8 个单词</span>
      </button>
    </div>

    <!-- Recent Learning -->
    <div class="bg-surface-container-lowest rounded-4xl p-6 elder-shadow mb-6">
      <div class="flex items-center gap-3 mb-4">
        <span class="material-symbols-outlined text-primary text-3xl">history</span>
        <h3 class="text-2xl font-bold text-on-surface">最近学习</h3>
      </div>
      <div class="space-y-3">
        <div class="flex items-center justify-between p-4 bg-surface-container rounded-3xl">
          <div class="flex items-center gap-3">
            <span class="w-12 h-12 bg-category-travel/20 rounded-full flex items-center justify-center">
              <span class="material-symbols-outlined text-category-travel text-2xl">flight_takeoff</span>
            </span>
            <div class="text-left">
              <p class="text-xl font-bold text-on-surface">Passport</p>
              <p class="text-base text-on-surface-variant">护照 · 出行旅游</p>
            </div>
          </div>
          <button onclick="quickReview('passport')" class="w-12 h-12 bg-warm-orange text-white rounded-full flex items-center justify-center">
            <span class="material-symbols-outlined text-2xl">play_arrow</span>
          </button>
        </div>
        <div class="flex items-center justify-between p-4 bg-surface-container rounded-3xl">
          <div class="flex items-center gap-3">
            <span class="w-12 h-12 bg-category-shopping/20 rounded-full flex items-center justify-center">
              <span class="material-symbols-outlined text-category-shopping text-2xl">shopping_cart</span>
            </span>
            <div class="text-left">
              <p class="text-xl font-bold text-on-surface">Water</p>
              <p class="text-base text-on-surface-variant">水 · 超市购物</p>
            </div>
          </div>
          <button onclick="quickReview('water')" class="w-12 h-12 bg-warm-orange text-white rounded-full flex items-center justify-center">
            <span class="material-symbols-outlined text-2xl">play_arrow</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Search Box -->
    <div class="bg-surface-container-lowest rounded-4xl p-6 elder-shadow">
      <div class="flex items-center gap-3 mb-4">
        <span class="material-symbols-outlined text-primary text-3xl">search</span>
        <h3 class="text-2xl font-bold text-on-surface">搜索单词</h3>
      </div>
      <div class="flex gap-3">
        <input type="text" placeholder="输入想学的单词..." class="flex-1 h-16 px-6 bg-surface-container rounded-3xl text-xl font-bold text-on-surface placeholder-on-surface-variant/50 border-2 border-transparent focus:border-warm-orange outline-none"/>
        <button class="w-16 h-16 bg-warm-orange text-white rounded-full flex items-center justify-center elder-shadow">
          <span class="material-symbols-outlined text-3xl">search</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.08)] rounded-t-4xl pb-6 z-50">
    <div class="flex justify-around items-center px-4 py-4">
      <a class="flex flex-col items-center justify-center text-slate-400 px-6 py-3">
        <span class="material-symbols-outlined text-3xl mb-1">auto_stories</span>
        <span class="text-sm font-bold">归档</span>
      </a>
      <a class="flex flex-col items-center justify-center bg-warm-orange/10 text-warm-orange-dark rounded-3xl px-8 py-3">
        <span class="material-symbols-outlined text-3xl mb-1" style="font-variation-settings: 'FILL' 1;">record_voice_over</span>
        <span class="text-sm font-bold">交流</span>
      </a>
      <a class="flex flex-col items-center justify-center text-slate-400 px-6 py-3">
        <span class="material-symbols-outlined text-3xl mb-1">family_history</span>
        <span class="text-sm font-bold">家人</span>
      </a>
    </div>
  </nav>

  <script>
    function navigateTo(page) {
      if (page === 'home') {
        window.location.href = 'elder-home.html';
      } else if (page === 'learning') {
        window.location.href = 'elder-learning.html';
      } else if (page === 'feedback') {
        window.location.href = 'elder-feedback.html';
      } else if (page === 'freestyle') {
        window.location.href = 'elder-freestyle.html';
      }
    }
    
    function selectCategory(category) {
      // 跳转到对应类别的单词列表
      alert('即将进入：' + category + ' 类别的学习');
      // 实际实现会跳转到类别详情页
    }
    
    function quickReview(word) {
      // 快速复习单词
      alert('开始复习：' + word);
      // 实际实现会直接播放该单词的音频
    }
  </script>
</body>
</html>
